name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'database/**'
    branches: [dev, main]
  push:
    paths:
      - 'backend/**'
    branches: [dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --passWithNoTests
