name: Monorepo CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
    branches: [dev, main]
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'pnpm-lock.yaml'
    branches: [dev]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Build Frontend
        run: |
          pnpm --filter e-wallet-sentiment-frontend run lint
          pnpm --filter e-wallet-sentiment-frontend run build
        
      - name: Lint Backend
        run: |
          pnpm --filter e-wallet-sentiment-backend run lint