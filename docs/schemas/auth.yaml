components:
  schemas:
    LoginRequest:
      type: object
      required:
        - password
      properties:
        username:
          type: string
          description: Username (wajib salah satu username atau email)
          example: "johndoe"
        email:
          type: string
          format: email
          description: Email (wajib salah satu username atau email)
          example: "john@example.com"
        password:
          type: string
          minLength: 1
          description: Password user
          example: "password123"

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJIUzI1NiIs..."
        refresh_token:
          type: string
          description: JWT refresh token
          example: "eyJhbGciOiJIUzI1NiIs..."

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          description: Username minimal 3 karakter
          example: "johndoe"
        email:
          type: string
          format: email
          description: Email yang valid
          example: "john@example.com"
        password:
          type: string
          minLength: 6
          description: Password minimal 6 karakter
          example: "password123"

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ForgetPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          description: Email terdaftar untuk reset password
          example: "john@example.com"

    ProfileData:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID user
          example: "9dd8d0a5-f902-4cd9-8838-4f42f0f3e658"
        email:
          type: string
          format: email
          description: Email user
          example: "john@example.com"
        username:
          type: string
          description: Username user
          example: "johndoe"
        role:
          type: string
          enum:
            - ADMIN
            - EDITOR
            - VIEWER
          description: Role user
          example: "VIEWER"
        avatarUrl:
          type: string
          nullable: true
          description: URL avatar user
          example: "https://example.com/avatar.jpg"
        isVerified:
          type: boolean
          description: Status verifikasi email
          example: true
        verifiedAt:
          type: string
          format: date-time
          nullable: true
          description: Waktu verifikasi email
          example: "2026-04-01T09:30:00.000Z"
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Waktu login terakhir
          example: "2026-04-07T10:15:00.000Z"
        createdAt:
          type: string
          format: date-time
          description: Waktu akun dibuat
          example: "2026-03-01T08:00:00.000Z"

    GetProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Profile fetched"
        data:
          $ref: "#/components/schemas/ProfileData"
